# Stack regra-legal: 1 LB + 2 workers, bridge, seccomp:unconfined, tmpfs sockets,
# limites 0.10/0.45/0.45 CPU + 32/150/150MB (total <= 1 CPU / 350MB).
# Pin: stack nos cores 0-1 do box (k6 roda em 2-3). WORKER_IO=epoll|uring.

x-worker: &worker
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  command: ["worker"]
  volumes:
    - socks:/run/sock
  security_opt:
    - seccomp:unconfined
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

services:
  worker0:
    <<: *worker
    container_name: zero-worker0
    environment:
      CTRL: /run/sock/api0.ctrl
      INDEX_PATH: /index/index.bin
      NPROBE: "12"
      REPAIR_MIN: "1"
      REPAIR_MAX: "4"
      WORKER_IO: "${WORKER_IO:-epoll}"
      BUSY_POLL_US: "${BUSY_POLL_US:-50}"
      CPU: "0"
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 150M

  worker1:
    <<: *worker
    container_name: zero-worker1
    environment:
      CTRL: /run/sock/api1.ctrl
      INDEX_PATH: /index/index.bin
      NPROBE: "12"
      REPAIR_MIN: "1"
      REPAIR_MAX: "4"
      WORKER_IO: "${WORKER_IO:-epoll}"
      BUSY_POLL_US: "${BUSY_POLL_US:-50}"
      CPU: "1"
    cpuset: "1"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 150M

  lb:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: zero-lb
    command: ["lb"]
    environment:
      PORT: "9999"
      BACKENDS: "/run/sock/api0.ctrl,/run/sock/api1.ctrl"
      CPU: "0"
    ports:
      - "${HOST_PORT:-9999}:9999"
    volumes:
      - socks:/run/sock
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    cpuset: "0"
    depends_on:
      - worker0
      - worker1
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 32M

volumes:
  socks:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m"
