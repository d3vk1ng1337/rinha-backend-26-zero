name: bench

# p99/score em amd64 Linux NATIVO (runner) — proxy muito melhor que OrbStack
# arm64 (que distorce a rede). Não é o rig (Mac Mini Haswell, mais lento), mas
# isola o caminho de rede nativo. Roda o teste oficial (1->900 rps).

on:
  workflow_dispatch:
    inputs:
      worker_io:
        description: "epoll | uring"
        default: "uring"
      busy_poll_us:
        description: "EPIOCSPARAMS busy poll (epoll worker)"
        default: "50"

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: nproc/cpu
        run: nproc && lscpu | grep -E "Model name|MHz" || true
      - name: build + up
        env:
          WORKER_IO: ${{ github.event.inputs.worker_io || 'uring' }}
          BUSY_POLL_US: ${{ github.event.inputs.busy_poll_us || '0' }}
        run: docker compose -f deploy/docker-compose.yml up -d --build
      - name: wait /ready
        run: for i in $(seq 1 90); do curl -fsS localhost:9999/ready && break; sleep 1; done
      - name: smoke
        run: |
          curl -fsS -X POST localhost:9999/fraud-score -H 'Content-Type: application/json' \
            --data-binary @test/req0.json || true
      - name: fetch test-data (não versionado)
        run: curl -fsSL https://raw.githubusercontent.com/dalvorsn/cpp-rinha-backend-2026/main/test/test-data.json -o test/test-data.json
      - name: k6 official load (1->900 rps, 120s)
        run: |
          docker run --rm --network host -v "$PWD/test":/app/test -w /app \
            grafana/k6 run -e HOST=http://localhost:9999 test/rinha-official.js || true
      - name: result
        run: cat test/results.json || echo "sem results.json"
      - uses: actions/upload-artifact@v4
        with:
          name: rinha-results
          path: test/results.json
        if: always()

  gate:
    # Valida a accuracy do caminho AVX2 em amd64 NATIVO (GH runner tem AVX2).
    # Falha (exit 1) se FP>0 ou FN>0.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build convert+gate
        run: cargo build --release -p zero-convert -p zero-gate
      - name: build index (amd64 nativo)
        run: ./target/release/zero-convert data/references.json.gz /tmp/idx.bin
      - name: fetch test-data
        run: curl -fsSL https://raw.githubusercontent.com/dalvorsn/cpp-rinha-backend-2026/main/test/test-data.json -o test/test-data.json
      - name: "accuracy gate (espera PATH AVX2, FP=0 FN=0)"
        run: ./target/release/zero-gate /tmp/idx.bin test/test-data.json
