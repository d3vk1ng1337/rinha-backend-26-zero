name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo build --release -p zero-convert -p zero-gate
      - run: ./target/release/zero-convert data/references.json.gz /tmp/idx.bin
      - run: curl -fsSL https://raw.githubusercontent.com/dalvorsn/cpp-rinha-backend-2026/main/test/test-data.json -o /tmp/test-data.json
      - name: "accuracy gate (fails if FP>0 or FN>0)"
        run: ./target/release/zero-gate /tmp/idx.bin /tmp/test-data.json
