x-worker: &worker
  image: ghcr.io/d3vk1ng1337/rinha-backend-26-zero:07dd6f3f17b0db25a8ebd76473df299a5a16bc66
  command: ["worker"]
  volumes:
    - socks:/run/sock
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

services:
  worker0:
    <<: *worker
    cpuset: "0"
    environment:
      CTRL: /run/sock/api0.ctrl
      INDEX_PATH: /index/index.bin
      NPROBE: "12"
      REPAIR_MIN: "1"
      REPAIR_MAX: "4"
      BUSY_POLL_US: "50"
      MALLOC_ARENA_MAX: "1"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 160M

  worker1:
    <<: *worker
    cpuset: "1"
    environment:
      CTRL: /run/sock/api1.ctrl
      INDEX_PATH: /index/index.bin
      NPROBE: "12"
      REPAIR_MIN: "1"
      REPAIR_MAX: "4"
      BUSY_POLL_US: "50"
      MALLOC_ARENA_MAX: "1"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 160M

  lb:
    image: ghcr.io/d3vk1ng1337/rinha-backend-26-zero:07dd6f3f17b0db25a8ebd76473df299a5a16bc66
    command: ["lb"]
    cpuset: "2,3"
    environment:
      PORT: "9999"
      BACKENDS: "/run/sock/api0.ctrl,/run/sock/api1.ctrl"
    ports:
      - "9999:9999"
    volumes:
      - socks:/run/sock
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - worker0
      - worker1
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 30M

volumes:
  socks:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m"
